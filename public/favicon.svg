<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#171717" />
    </linearGradient>

    <!-- Accent Gradient (Blue to Purple for AI vibe) -->
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Secondary Gradient (Teal/Cyan) -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Inner Glow for the Neural Core -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Premium App Icon Base -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <!-- Outer Neural Ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#cyanGrad)" stroke-width="3" opacity="0.25" />
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#cyanGrad)" stroke-width="10" stroke-dasharray="1 38" stroke-linecap="round" opacity="0.7" />

  <!-- Inner Glowing Elements -->
  <g filter="url(#glow)">
    <!-- Abstract Neural Hexagon -->
    <polygon points="256,120 374,188 374,324 256,392 138,324 138,188" fill="none" stroke="url(#accentGrad)" stroke-width="16" stroke-linejoin="round" />
    
    <!-- Connecting Synaptic Pathways -->
    <line x1="256" y1="120" x2="256" y2="180" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round" />
    <line x1="138" y1="188" x2="190" y2="218" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round" />
    <line x1="374" y1="188" x2="322" y2="218" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round" />
    <line x1="138" y1="324" x2="190" y2="294" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round" />
    <line x1="374" y1="324" x2="322" y2="294" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round" />
    <line x1="256" y1="392" x2="256" y2="332" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round" />

    <!-- Core Intelligence / Lightning Symbol (⚡) -->
    <path d="M 276 194 L 216 274 L 256 274 L 236 334 L 296 234 L 256 234 Z" fill="#ffffff" />
  </g>
  
  <!-- Edge Neural Nodes -->
  <circle cx="256" cy="120" r="14" fill="#ffffff" />
  <circle cx="374" cy="188" r="14" fill="#ffffff" />
  <circle cx="374" cy="324" r="14" fill="#ffffff" />
  <circle cx="256" cy="392" r="14" fill="#ffffff" />
  <circle cx="138" cy="324" r="14" fill="#ffffff" />
  <circle cx="138" cy="188" r="14" fill="#ffffff" />
</svg>
