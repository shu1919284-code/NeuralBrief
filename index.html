<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <script>
      (function() {
        const storedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (storedTheme === 'dark' || (!storedTheme && systemPrefersDark)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <title>NeuralBrief — Your Daily AI &amp; Tech Intelligence Digest</title>
    <meta
      name="description"
      content="NeuralBrief delivers a personalized AI &amp; tech news digest to your Gmail every morning — curated by four AI agents, zero noise."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://neuralbrief.app" />
    <meta property="og:title" content="NeuralBrief — Your Daily AI &amp; Tech Intelligence Digest" />
    <meta
      property="og:description"
      content="NeuralBrief delivers a personalized AI &amp; tech news digest to your Gmail every morning — curated by four AI agents, zero noise."
    />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NeuralBrief — Your Daily AI &amp; Tech Intelligence Digest" />
    <meta
      name="twitter:description"
      content="NeuralBrief delivers a personalized AI &amp; tech news digest to your Gmail every morning — curated by four AI agents, zero noise."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
