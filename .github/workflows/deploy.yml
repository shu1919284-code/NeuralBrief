# ──────────────────────────────────────────────────────────────────────────────
# NeuralBrief CI/CD
#
# Required GitHub Secrets:
#   FIREBASE_TOKEN   — Firebase CLI token (firebase login:ci)
#   GCP_PROJECT_ID   — GCP project ID (e.g. neuralbrief-prod)
#   GCP_SA_KEY       — Base64-encoded GCP service account JSON key
#   CLOUD_RUN_SERVICE — Cloud Run service name (e.g. neuralbrief-backend)
# ──────────────────────────────────────────────────────────────────────────────

name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: TypeScript check
        run: npx tsc --noEmit

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (Vite)
        run: npm run build

      - name: Deploy Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project "${{ secrets.GCP_PROJECT_ID }}" --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive
