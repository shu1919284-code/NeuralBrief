# ──────────────────────────────────────────────────────────────────────────────
# NeuralBrief CI/CD
#
# Required GitHub Secrets:
#   FIREBASE_TOKEN   — Firebase CLI token (firebase login:ci)
#   GCP_PROJECT_ID   — GCP project ID (e.g. neuralbrief-prod)
#   GCP_SA_KEY       — Base64-encoded GCP service account JSON key
#   CLOUD_RUN_SERVICE — Cloud Run service name (e.g. neuralbrief-backend)
# ──────────────────────────────────────────────────────────────────────────────

name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: TypeScript check
        run: npx tsc --noEmit

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (Vite)
        run: npm run build

      - name: Deploy Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project "${{ secrets.GCP_PROJECT_ID }}" --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/neuralbrief-backend:${{ github.sha }} \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/neuralbrief-backend:latest \
            .

      - name: Push Docker image
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/neuralbrief-backend:${{ github.sha }}
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/neuralbrief-backend:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ secrets.CLOUD_RUN_SERVICE }} \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/neuralbrief-backend:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --quiet
